<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aomori Life Archive 2026</title>
    <style>
        :root { --bg: #efefef; --text: #1a1a1a; --accent: #b03a2e; --grid-bg: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background-color: var(--bg); font-family: 'PingFang TC', sans-serif; color: var(--text); line-height: 1.6; overflow-x: hidden; }

        /* 選單按鈕邏輯：滑動隱藏 */
        .menu-trigger { position: fixed; top: 25px; left: 25px; z-index: 2000; font-size: 24px; cursor: pointer; transition: 0.3s; opacity: 1; }
        .menu-hidden { opacity: 0; pointer-events: none; transform: translateY(-10px); }

        nav {
            position: fixed; top: 0; left: -100%; width: 75%; height: 100vh;
            background: #fff; z-index: 2001; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.05);
        }
        nav.open { left: 0; }
        nav a { text-decoration: none; color: #888; font-size: 14px; font-weight: bold; letter-spacing: 4px; margin: 20px 0; }
        nav a.active { color: var(--text); border-bottom: 1px solid var(--text); }

        .page { display: none; width: 100vw; min-height: 100vh; padding: 100px 25px 80px; }
        .page.active { display: block; animation: fadeIn 0.5s ease; }
        #home { display: none; height: 100vh; padding: 0 25px; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #home.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .info-card { background: #fff; padding: 25px; margin-bottom: 25px; border: 0.5px solid #000; }
        .info-card h3 { font-size: 13px; margin: 0 0 15px 0; letter-spacing: 2px; border-bottom: 1.5px solid #1a1a1a; padding-bottom: 8px; }

        /* 互動式景點清單樣式 */
        .add-sight-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .add-sight-box input { flex: 1; border: 1px solid #ddd; padding: 8px; font-size: 12px; outline: none; }
        .add-sight-box button { background: var(--text); color: #fff; border: none; padding: 8px 15px; font-size: 12px; cursor: pointer; }

        .sight-item { display: flex; align-items: flex-start; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 0.5px solid #eee; }
        .sight-checkbox { width: 18px; height: 18px; border: 1px solid #000; margin-right: 12px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 3px; }
        .sight-checkbox.checked::after { content: '✓'; font-size: 14px; }
        .sight-content { flex: 1; font-size: 13px; }
        .sight-content.done { text-decoration: line-through; color: #aaa; }
        .delete-btn { color: #ccc; font-size: 10px; margin-left: 10px; cursor: pointer; }

        /* 日曆網格與其他維持不變 */
        .calendar-zine-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px 15px; margin-top: 40px; }
        .zine-item { position: relative; aspect-ratio: 1 / 1.3; background: var(--grid-bg); border: 0.5px solid #000; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 5px; cursor: pointer; }
        .zine-num { font-family: 'Courier New', monospace; font-size: 10px; color: #888; position: absolute; top: -22px; width: 100%; text-align: center; }
        .zine-photo-box { width: 85%; height: 75%; background-color: #f2f2f0; background-size: cover; background-position: center; }
        .zine-label { width: 100%; text-align: center; font-size: 7px; color: #666; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 3000; align-items: center; justify-content: center; padding: 30px; backdrop-filter: blur(5px); }
        .modal-content { background: #fff; width: 100%; max-width: 380px; padding: 40px 25px; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 20px; color: #ccc; cursor: pointer; }
    </style>
</head>
<body>

<div class="menu-trigger" id="menuBtn" onclick="toggleMenu()">☰</div>

<nav id="sideNav">
    <a href="javascript:void(0)" onclick="goTo('home')" id="nav-home">INDEX</a>
    <a href="javascript:void(0)" onclick="goTo('schedule')" id="nav-schedule">SCHEDULE</a>
    <a href="javascript:void(0)" onclick="goTo('sights')" id="nav-sights">SIGHTS</a>
    <a href="javascript:void(0)" onclick="goTo('base')" id="nav-base">BASE & PLAN</a>
    <a href="javascript:void(0)" onclick="goTo('budget')" id="nav-budget">BUDGET</a>
</nav>

<section id="home" class="page active">
    <h1 style="font-size: 32px; font-weight: 200; letter-spacing: 12px; margin: 0;">AOMORI</h1>
    <p style="font-size: 10px; color: #aaa; letter-spacing: 4px; margin-top: 15px;">LIFE ARCHIVE / 2026</p>
</section>

<section id="schedule" class="page">
    <div style="text-align: center; font-size: 11px; letter-spacing: 5px; color: #bbb; margin-bottom: 20px;">30-DAY LOG</div>
    <div class="calendar-zine-grid" id="grid-content"></div>
</section>

<section id="sights" class="page">
    <div class="info-card">
        <h3>📍 自定義景點清單</h3>
        <div class="add-sight-box">
            <input type="text" id="newSightInput" placeholder="輸入新景點 (如: 昭和大佛)...">
            <button onclick="addNewSight()">新增</button>
        </div>
        <div id="sight-list-container">
            </div>
    </div>
    <div class="info-card" style="background: #f9f9f9; font-size: 10px; color: #999;">
        <p>💡 提示：點擊方框標記已完成，點擊右側 X 刪除項目。</p>
        <p>🔗 推薦參考：<a href="https://www.threads.net/@likeit.aomoricity.tw" target="_blank" style="color:#b03a2e;">青森市官方 Threads</a></p>
    </div>
</section>

<section id="base" class="page">
    <div class="info-card"><h3>📍 STAY</h3><p>Aomori Furukawa Studio (Airbnb)</p></div>
    <div class="info-card"><h3>🔍 導師方案</h3><p>AmazingTalker / Preply (中日雙語)</p></div>
</section>

<section id="budget" class="page">
    <div class="info-card"><h3>💰 BUDGET</h3><p>預估 NT$ 72,000+ (不含機票)</p></div>
</section>

<div class="modal" id="infoModal" onclick="checkClose(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="m-title" style="font-weight:bold; font-size:14px; margin-bottom:20px; border-bottom:1px solid #eee; padding-bottom:10px;"></div>
        <div id="m-content"></div>
    </div>
</div>

<script>
    // --- 選單與捲動邏輯 ---
    const menuBtn = document.getElementById('menuBtn');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 20) { menuBtn.classList.add('menu-hidden'); } 
        else { menuBtn.classList.remove('menu-hidden'); }
    });
    function toggleMenu() { document.getElementById('sideNav').classList.toggle('open'); }
    function goTo(id) { toggleMenu(); showPage(id); }
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('nav a').forEach(n => n.classList.remove('active'));
        const navTarget = document.getElementById('nav-' + pageId);
        if(navTarget) navTarget.classList.add('active');
        window.scrollTo(0, 0);
    }

    // --- SIGHTS 互動邏輯 ---
    let mySights = [
        { name: "青森縣立中央醫院前 櫻花大道", done: false },
        { name: "昭和大佛 (全日本最大青銅坐像)", done: false },
        { name: "古川市場 DIY 海鮮丼", done: false },
        { name: "弘前城與星巴克文化財門市", done: false }
    ];

    function renderSights() {
        const container = document.getElementById('sight-list-container');
        container.innerHTML = '';
        mySights.forEach((sight, index) => {
            container.innerHTML += `
                <div class="sight-item">
                    <div class="sight-checkbox ${sight.done ? 'checked' : ''}" onclick="toggleSight(${index})"></div>
                    <div class="sight-content ${sight.done ? 'done' : ''}">${sight.name}</div>
                    <div class="delete-btn" onclick="deleteSight(${index})">✕</div>
                </div>`;
        });
    }

    function addNewSight() {
        const input = document.getElementById('newSightInput');
        if (input.value.trim() !== '') {
            mySights.push({ name: input.value, done: false });
            input.value = '';
            renderSights();
        }
    }

    function toggleSight(index) {
        mySights[index].done = !mySights[index].done;
        renderSights();
    }

    function deleteSight(index) {
        mySights.splice(index, 1);
        renderSights();
    }

    // 初始化渲染
    renderSights();

    // --- SCHEDULE 網格邏輯 ---
    const scheduleData = [];
    for(let i=0; i<30; i++) {
        scheduleData.push({ title: "Archive Day", detail: `第 ${i+1} 天：上午導師課程，下午進行 Zine 攝影實踐。`, img: `https://picsum.photos/id/${i+10}/400/500?grayscale` });
    }
    const grid = document.getElementById('grid-content');
    scheduleData.forEach((item, index) => {
        const day = (index + 1).toString().padStart(2, '0');
        grid.innerHTML += `<div class="zine-item" onclick="openModal(${index})"><div class="zine-num">${day}</div><div class="zine-photo-box" style="background-image: url('${item.img}')"></div><div class="zine-label">${item.title}</div></div>`;
    });

    function openModal(index) {
        const data = scheduleData[index];
        document.getElementById('m-title').innerText = `DAY ${(index + 1).toString().padStart(2, '0')}: ${data.title}`;
        document.getElementById('m-content').innerHTML = `<p style="font-size:12px; color:#666;">${data.detail}</p>`;
        document.getElementById('infoModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('infoModal').style.display = 'none'; }
    function checkClose(e) { if(e.target.id === 'infoModal') closeModal(); }
</script>

</body>
</html>

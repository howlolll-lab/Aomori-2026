
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Aomori Life Archive V7</title>
<style>
body{font-family:system-ui;margin:40px;background:#fafafa}
h1{margin-bottom:30px}
.zone{margin-bottom:40px}
.card{border:1px solid #e5e5e5;padding:12px;border-radius:8px;margin-top:8px;background:white}
</style>
</head>
<body>

<h1>Aomori Life Archive V7</h1>

<div>
<input id="map-input" placeholder="貼上 Google Maps 連結" style="width:400px;padding:8px">
<button id="map-add">新增景點</button>
</div>

<div class="zone">
<h2>🍎 Aomori City</h2>
<div id="aomori-list"></div>
</div>

<div class="zone">
<h2>🏯 Hirosaki & Nature</h2>
<div id="hirosaki-list"></div>
</div>

<script>

const AOMORI_KEYWORDS=[
"青森","Aomori","青森市","青森駅","青森站","新町","古川","安方","ASPAM","A-FACTORY","善知鳥","古川市場"
]

const HIROSAKI_KEYWORDS=[
"弘前","Hirosaki","弘前城","弘前公園","十和田","奧入瀨","奥入瀬","五所川原","蘆野","黒石","黑石","八戸","八戶","白神","津軽","津輕"
]

function autoClassify(text){

const lower=text.toLowerCase()

for(const k of AOMORI_KEYWORDS){
if(lower.includes(k.toLowerCase())) return "aomori"
}

for(const k of HIROSAKI_KEYWORDS){
if(lower.includes(k.toLowerCase())) return "hirosaki"
}

return "hirosaki"
}

function addSightFromLink(url){

let name=""

if(url.includes("/place/")){
try{
name=decodeURIComponent(url.split("/place/")[1].split("/")[0]).replace(/\+/g," ")
}catch(e){}
}

if(!name) name="New Sight"

const zone=autoClassify(name+" "+url)
const container=document.getElementById(zone+"-list")

const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<div>
<input type="checkbox">
<span contenteditable="true">${name}</span>
<button onclick="this.closest('.card').remove()">✕</button>
</div>
<div style="margin-top:6px">
<a href="${url}" target="_blank">${url}</a>
</div>
`

container.appendChild(card)

}

document.getElementById("map-add").onclick=()=>{

const url=document.getElementById("map-input").value.trim()

if(!url) return

addSightFromLink(url)

document.getElementById("map-input").value=""

}

</script>

</body>
</html>
